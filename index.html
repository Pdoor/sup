<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SUP · Torre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean:#0a1628;--deep:#060e1c;--surface:#0f2040;
    --card:rgba(15,32,64,0.7);--glass:rgba(255,255,255,0.04);
    --border:rgba(255,255,255,0.08);--accent:#00d4ff;--accent2:#0085ff;
    --warn:#ff4757;--good:#2ed573;--text:#e8f4ff;
    --muted:rgba(232,244,255,0.4);
    --mono:'DM Mono',monospace;--display:'Bebas Neue',sans-serif;--body:'DM Sans',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;min-height:100vh;background:var(--deep);color:var(--text);font-family:var(--body);overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:0;
    background:radial-gradient(ellipse 80% 60% at 20% 80%,rgba(0,133,255,.12) 0%,transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 20%,rgba(0,212,255,.08) 0%,transparent 50%);
    animation:breathe 8s ease-in-out infinite alternate}
  @keyframes breathe{0%{opacity:.8;transform:scale(1)}100%{opacity:1;transform:scale(1.02)}}
  #app{position:relative;z-index:1;max-width:430px;margin:0 auto;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,20px);min-height:100vh}
  header{padding:20px 24px 0;display:flex;align-items:flex-start;justify-content:space-between}
  .logo-area h1{font-family:var(--display);font-size:52px;letter-spacing:3px;line-height:1;
    background:linear-gradient(135deg,#fff 0%,var(--accent) 100%);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .logo-area .sub{font-family:var(--mono);font-size:10px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;margin-top:2px}
  .header-right{text-align:right}
  .time-display{font-family:var(--mono);font-size:22px;font-weight:300;color:var(--text);letter-spacing:1px}
  .date-display{font-family:var(--mono);font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:3px}
  .status-bar{margin:16px 24px 0;display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--glass);border:1px solid var(--border);border-radius:20px}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--good);box-shadow:0 0 8px var(--good);animation:pulse-dot 2s ease-in-out infinite}
  .status-dot.loading{background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .status-dot.error{background:var(--warn);box-shadow:0 0 8px var(--warn);animation:none}
  @keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}
  .status-text{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;flex:1}
  .refresh-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;padding:2px;line-height:1;transition:color .2s,transform .3s}
  .refresh-btn:active{transform:rotate(180deg);color:var(--accent)}
  .metrics-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 24px 0}
  .metric-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px 18px;
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:relative;overflow:hidden;transition:transform .2s}
  .metric-card:active{transform:scale(.97)}
  .metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(0,212,255,.3),transparent)}
  .metric-card.warn-card{border-color:rgba(255,71,87,.3)}
  .metric-card.warn-card::before{background:linear-gradient(90deg,transparent,rgba(255,71,87,.4),transparent)}
  .metric-label{font-family:var(--mono);font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:6px}
  .metric-value{font-family:var(--display);font-size:48px;letter-spacing:2px;line-height:1;color:var(--text)}
  .metric-unit{font-family:var(--mono);font-size:11px;letter-spacing:1px;color:var(--muted);margin-top:4px}
  .metric-trend{position:absolute;top:18px;right:16px;font-size:18px;font-weight:bold}
  .trend-up{color:var(--warn)}.trend-down{color:var(--good)}.trend-stable{color:var(--muted)}
  .metric-bar{margin-top:12px;height:3px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden}
  .metric-bar-fill{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.4,0,.2,1)}
  .wind-dir-card{margin:0 24px;background:var(--card);border:1px solid var(--border);border-radius:20px;
    padding:20px 20px 18px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:relative;overflow:hidden}
  .wind-dir-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(0,212,255,.3),transparent)}
  .compass-wrapper{display:flex;align-items:center;gap:20px}
  .compass{width:72px;height:72px;position:relative;flex-shrink:0}
  .compass-ring{width:100%;height:100%;border-radius:50%;border:1px solid rgba(0,212,255,.2);position:relative;
    background:radial-gradient(circle,rgba(0,212,255,.04) 0%,transparent 70%)}
  .compass-ring::before{content:'N';position:absolute;top:4px;left:50%;transform:translateX(-50%);
    font-family:var(--mono);font-size:8px;letter-spacing:1px;color:var(--accent);font-weight:500}
  .compass-needle{position:absolute;top:50%;left:50%;width:2px;height:26px;margin-left:-1px;margin-top:-22px;
    transform-origin:bottom center;transition:transform 1s cubic-bezier(.4,0,.2,1)}
  .needle-north{background:linear-gradient(to bottom,var(--accent),rgba(0,212,255,.3));border-radius:2px 2px 0 0;
    position:absolute;width:100%;bottom:0;height:60%}
  .needle-south{background:linear-gradient(to top,var(--warn),rgba(255,71,87,.3));border-radius:0 0 2px 2px;
    position:absolute;width:100%;top:0;height:40%}
  .compass-dot{position:absolute;top:50%;left:50%;width:5px;height:5px;border-radius:50%;background:var(--text);transform:translate(-50%,-50%)}
  .wind-dir-info{flex:1}
  .dir-now{font-family:var(--display);font-size:38px;letter-spacing:2px;line-height:1}
  .dir-deg{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;margin-top:2px}
  .forecast-row{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
  .forecast-label{font-family:var(--mono);font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
  .forecast-arrows{display:flex;align-items:center;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
  .forecast-arrows::-webkit-scrollbar{display:none}
  .forecast-item{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:52px;padding:8px 6px;border-radius:12px}
  .forecast-item.warn-dir{background:rgba(255,71,87,.08)}
  .forecast-time{font-family:var(--mono);font-size:8px;letter-spacing:1px;color:var(--muted)}
  .forecast-dir-val{font-family:var(--display);font-size:20px;letter-spacing:1px}
  .forecast-dir-val.warn{color:var(--warn)}.forecast-dir-val.ok{color:var(--accent)}
  .forecast-deg{font-family:var(--mono);font-size:8px;color:var(--muted)}
  .arrow-sep{font-size:10px;color:var(--border);padding:0 2px;margin-top:-8px}
  /* WEBCAM */
  .webcam-section{margin:12px 24px 0}
  .section-label{font-family:var(--mono);font-size:8px;letter-spacing:4px;color:var(--muted);text-transform:uppercase;
    margin-bottom:10px;padding-left:4px;display:flex;align-items:center;gap:8px}
  .live-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(255,71,87,.15);
    border:1px solid rgba(255,71,87,.3);border-radius:20px;padding:2px 8px;font-size:8px;letter-spacing:2px;color:var(--warn)}
  .live-badge::before{content:'';width:4px;height:4px;border-radius:50%;background:var(--warn);animation:pulse-dot 1.5s ease-in-out infinite}
  .webcam-container{position:relative;border-radius:20px;overflow:hidden;border:1px solid var(--border);background:#000;aspect-ratio:16/9}
  #webcamIframe{width:100%;height:100%;border:none;display:block}
  #webcamThumb{display:none;width:100%;height:100%;position:absolute;inset:0;cursor:pointer;
    align-items:center;justify-content:center}
  .thumb-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(.5);transition:filter .3s}
  .thumb-scanlines{position:absolute;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px)}
  .play-btn{position:relative;z-index:2;width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.15);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,.3);
    display:flex;align-items:center;justify-content:center;transition:transform .2s,background .2s}
  #webcamThumb:hover .thumb-bg{filter:brightness(.65)}
  #webcamThumb:hover .play-btn,#webcamThumb:active .play-btn{transform:scale(1.1);background:rgba(255,71,87,.35);border-color:var(--warn)}
  .play-triangle{width:0;height:0;border-style:solid;border-width:11px 0 11px 22px;border-color:transparent transparent transparent #fff;margin-left:5px}
  .thumb-overlay{position:absolute;bottom:0;left:0;right:0;z-index:2;padding:14px 16px 12px;
    background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 100%);
    display:flex;align-items:flex-end;justify-content:space-between}
  .thumb-title{font-family:var(--mono);font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.8);text-transform:uppercase}
  .open-ext-btn{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.5);
    background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;
    padding:4px 10px;text-transform:uppercase;cursor:pointer}
  .webcam-badge{position:absolute;top:12px;left:12px;z-index:3;font-family:var(--mono);font-size:8px;letter-spacing:2px;
    color:rgba(255,255,255,.7);background:rgba(0,0,0,.5);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    padding:4px 10px;border-radius:20px;text-transform:uppercase;pointer-events:none}
  /* SWELL */
  .swell-card{margin:12px 24px 0;background:var(--card);border:1px solid var(--border);border-radius:20px;
    padding:18px 20px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    display:flex;gap:20px;align-items:center;position:relative;overflow:hidden}
  .swell-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
    background:linear-gradient(90deg,transparent,rgba(0,212,255,.3),transparent)}
  .swell-vis{flex-shrink:0;width:60px;height:60px}
  .wave-svg{width:100%;height:100%}
  .swell-info{flex:1}
  .swell-val{font-family:var(--display);font-size:36px;letter-spacing:2px;line-height:1}
  .swell-label-text{font-family:var(--mono);font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-top:4px}
  .skeleton{background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);
    background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px;min-height:40px;min-width:60px;display:inline-block}
  @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
  .fade-in{opacity:0;transform:translateY(16px);animation:fadeUp .6s cubic-bezier(.4,0,.2,1) forwards}
  .fade-in:nth-child(1){animation-delay:.05s}.fade-in:nth-child(2){animation-delay:.1s}
  .fade-in:nth-child(3){animation-delay:.15s}.fade-in:nth-child(4){animation-delay:.2s}
  .fade-in:nth-child(5){animation-delay:.25s}.fade-in:nth-child(6){animation-delay:.3s}
  @keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
  footer{margin:24px 24px env(safe-area-inset-bottom,24px);text-align:center;font-family:var(--mono);
    font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.15);text-transform:uppercase}
</style>
</head>
<body>
<div id="app">
  <header class="fade-in">
    <div class="logo-area">
      <h1>SUP</h1>
      <div class="sub">Torre Pedrera · Adriatico</div>
    </div>
    <div class="header-right">
      <div class="time-display" id="clock">--:--</div>
      <div class="date-display" id="dateDisplay">---</div>
    </div>
  </header>

  <div class="status-bar fade-in">
    <div class="status-dot loading" id="statusDot"></div>
    <span class="status-text" id="statusText">Caricamento dati...</span>
    <button class="refresh-btn" onclick="loadData()">↻</button>
  </div>

  <div class="metrics-grid fade-in">
    <div class="metric-card" id="waveCard">
      <div class="metric-label"><span>〜</span>Onde</div>
      <div class="metric-value skeleton" id="waveVal"></div>
      <div class="metric-unit" id="waveUnit"></div>
      <div class="metric-bar"><div class="metric-bar-fill" id="waveBar" style="width:0%;background:linear-gradient(90deg,#0085ff,#00d4ff)"></div></div>
      <div class="metric-trend" id="waveTrend"></div>
    </div>
    <div class="metric-card" id="windCard">
      <div class="metric-label"><span>≋</span>Vento</div>
      <div class="metric-value skeleton" id="windVal"></div>
      <div class="metric-unit" id="windUnit"></div>
      <div class="metric-bar"><div class="metric-bar-fill" id="windBar" style="width:0%;background:linear-gradient(90deg,#0085ff,#00d4ff)"></div></div>
      <div class="metric-trend" id="windTrend"></div>
    </div>
  </div>

  <div style="height:12px"></div>

  <div class="wind-dir-card fade-in">
    <div style="font-family:var(--mono);font-size:8px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:16px">Direzione Vento</div>
    <div class="compass-wrapper">
      <div class="compass">
        <div class="compass-ring">
          <div class="compass-needle" id="compassNeedle">
            <div class="needle-south"></div>
            <div class="needle-north"></div>
          </div>
          <div class="compass-dot"></div>
        </div>
      </div>
      <div class="wind-dir-info">
        <div class="dir-now" id="dirNow">---</div>
        <div class="dir-deg" id="dirDeg">--- °</div>
      </div>
    </div>
    <div class="forecast-row">
      <div class="forecast-label">Evoluzione prossime ore</div>
      <div class="forecast-arrows" id="forecastArrows">
        <div style="font-family:var(--mono);font-size:9px;color:var(--muted)">Caricamento...</div>
      </div>
    </div>
  </div>

  <div class="swell-card fade-in">
    <div class="swell-vis">
      <svg class="wave-svg" viewBox="0 0 60 60" fill="none">
        <path d="M5 40 Q15 20 25 35 Q35 50 45 30 Q50 22 55 28" stroke="rgba(0,212,255,0.6)" stroke-width="2" fill="none" stroke-linecap="round">
          <animateTransform attributeName="transform" type="translate" values="0,0;-8,0;0,0" dur="3s" repeatCount="indefinite"/>
        </path>
        <path d="M5 48 Q15 35 25 42 Q35 52 45 38 Q50 32 55 36" stroke="rgba(0,133,255,0.3)" stroke-width="1.5" fill="none" stroke-linecap="round">
          <animateTransform attributeName="transform" type="translate" values="0,0;8,0;0,0" dur="4s" repeatCount="indefinite"/>
        </path>
      </svg>
    </div>
    <div class="swell-info">
      <div class="swell-val skeleton" id="swellVal"></div>
      <div class="swell-label-text">Swell height</div>
    </div>
    <div style="text-align:right">
      <div style="font-family:var(--mono);font-size:8px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Dir. onde</div>
      <div style="font-family:var(--display);font-size:28px;letter-spacing:2px" id="waveDir">---</div>
    </div>
  </div>

  <div class="webcam-section fade-in">
    <div class="section-label">
      Webcam Live
      <span class="live-badge">LIVE</span>
    </div>
    <div class="webcam-container" id="webcamBox">
      <iframe id="webcamIframe" src="" allow="autoplay;encrypted-media;picture-in-picture" allowfullscreen playsinline loading="lazy" referrerpolicy="no-referrer" title="Webcam Torre Pedrera"></iframe>
      <div id="webcamThumb" onclick="openExternal()">
        <div class="thumb-bg" id="thumbBg"></div>
        <div class="thumb-scanlines"></div>
        <div class="play-btn"><div class="play-triangle"></div></div>
        <div class="thumb-overlay">
          <div class="thumb-title">Torre Pedrera · Live</div>
          <span class="open-ext-btn">Apri live ↗</span>
        </div>
      </div>
      <div class="webcam-badge">Torre Pedrera</div>
    </div>
  </div>

  <footer class="fade-in">Open-Meteo · Marine API · Aggiornato ogni 10 min</footer>
</div>

<script>
const VID = '1A2PUj7SS5o';
const EMBED_SOURCES = [
  'https://www.youtube-nocookie.com/embed/'+VID+'?autoplay=1&mute=1&playsinline=1&controls=1&rel=0&modestbranding=1&iv_load_policy=3',
  'https://yewtu.be/embed/'+VID+'?autoplay=1&muted=1&listen=0',
  'https://inv.nadeko.net/embed/'+VID+'?autoplay=1&muted=1',
];
let srcIdx=0, iframeTimer=null;

function initWebcam(){trySource()}

function trySource(){
  if(srcIdx>=EMBED_SOURCES.length){showFallback();return}
  const f=document.getElementById('webcamIframe');
  f.src=EMBED_SOURCES[srcIdx];
  clearTimeout(iframeTimer);
  iframeTimer=setTimeout(()=>{srcIdx++;trySource()},9000);
  // Se il player YT risponde, l'embed funziona
  window.addEventListener('message',function h(e){
    try{
      const d=typeof e.data==='string'?JSON.parse(e.data):e.data;
      if(d&&(d.event==='onReady'||d.event==='infoDelivery'||d.info)){
        clearTimeout(iframeTimer);window.removeEventListener('message',h);
      }
    }catch(_){}
  });
}

function showFallback(){
  clearTimeout(iframeTimer);
  document.getElementById('webcamIframe').style.display='none';
  const t=document.getElementById('webcamThumb');
  t.style.display='flex';
  // Thumbnail da ytimg (no tracking, solo CDN immagine)
  const urls=[
    'https://i.ytimg.com/vi/'+VID+'/maxresdefault.jpg',
    'https://i.ytimg.com/vi/'+VID+'/hqdefault.jpg',
    'https://i.ytimg.com/vi/'+VID+'/mqdefault.jpg',
  ];
  const bg=document.getElementById('thumbBg');
  let ti=0;
  (function load(){
    if(ti>=urls.length)return;
    const img=new Image();
    img.onload=()=>{bg.style.backgroundImage="url('"+urls[ti]+"')"};
    img.onerror=()=>{ti++;load()};
    img.src=urls[ti];
  })();
}

function openExternal(){
  const a=document.createElement('a');
  a.href='https://www.youtube.com/watch?v='+VID;
  a.target='_blank';a.rel='noopener noreferrer';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

window.addEventListener('load',initWebcam);

// CLOCK
function updateClock(){
  const now=new Date();
  document.getElementById('clock').textContent=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  const days=['DOM','LUN','MAR','MER','GIO','VEN','SAB'];
  const months=['GEN','FEB','MAR','APR','MAG','GIU','LUG','AGO','SET','OTT','NOV','DIC'];
  document.getElementById('dateDisplay').textContent=days[now.getDay()]+' '+now.getDate()+' '+months[now.getMonth()];
}
updateClock();setInterval(updateClock,1000);

// METEO
const LAT=44.1166,LON=12.4862;
const WU='https://api.open-meteo.com/v1/forecast?latitude='+LAT+'&longitude='+LON+'&current=wind_speed_10m,wind_direction_10m&hourly=wind_speed_10m,wind_direction_10m&timezone=Europe%2FRome&forecast_days=1';
const MU='https://marine-api.open-meteo.com/v1/marine?latitude='+LAT+'&longitude='+LON+'&hourly=wave_height,swell_wave_height,wave_direction&timezone=Europe%2FRome&forecast_days=1';

function closestIdx(times){
  const now=new Date();let best=0,min=Infinity;
  for(let i=0;i<times.length;i++){const d=Math.abs(now-new Date(times[i]));if(d<min){min=d;best=i}}
  return best;
}
function getDir(deg){if(deg==null)return 'N/D';const d=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSO','SO','OSO','O','ONO','NO','NNO'];return d[Math.round(deg/22.5)%16]}
function isWarn(deg){return deg>=185&&deg<=355}
function trend(c,n){if(n>c+.5)return{a:'▲',k:'trend-up'};if(n<c-.5)return{a:'▼',k:'trend-down'};return{a:'—',k:'trend-stable'}}
function setStatus(t,m){document.getElementById('statusDot').className='status-dot '+(t==='ok'?'':t);document.getElementById('statusText').textContent=m}

async function loadData(){
  setStatus('loading','Aggiornamento dati meteo...');
  try{
    const[wr,mr]=await Promise.all([fetch(WU),fetch(MU)]);
    const W=await wr.json(),M=await mr.json();
    const wi=closestIdx(W.hourly.time),mi=closestIdx(M.hourly.time);
    // Onde
    const wc=M.hourly.wave_height[mi],wn=M.hourly.wave_height[mi+1];
    const wcm=wc!=null?Math.round(wc*100):null,wnm=wn!=null?Math.round(wn*100):null;
    const we=document.getElementById('waveVal');we.className='metric-value';we.textContent=wcm!=null?wcm:'N/D';
    document.getElementById('waveUnit').textContent='centimetri';
    if(wcm!=null&&wnm!=null){const t=trend(wcm,wnm);const e=document.getElementById('waveTrend');e.textContent=t.a;e.className='metric-trend '+t.k}
    if(wcm!=null)document.getElementById('waveBar').style.width=Math.min(100,(wcm/200)*100)+'%';
    // Vento
    const vc=W.current.wind_speed_10m,vn=W.hourly.wind_speed_10m[wi+1];
    const ve=document.getElementById('windVal');ve.className='metric-value';ve.textContent=vc!=null?vc.toFixed(1):'N/D';
    document.getElementById('windUnit').textContent='km/h';
    if(vc!=null&&vn!=null){const t=trend(vc,vn);const e=document.getElementById('windTrend');e.textContent=t.a;e.className='metric-trend '+t.k}
    if(vc!=null){document.getElementById('windBar').style.width=Math.min(100,(vc/60)*100)+'%';document.getElementById('windCard').classList.toggle('warn-card',vc>20)}
    // Dir vento
    const dd=W.current.wind_direction_10m;
    document.getElementById('dirNow').textContent=getDir(dd);
    document.getElementById('dirDeg').textContent=dd!=null?dd+' °':'--- °';
    if(dd!=null){document.getElementById('compassNeedle').style.transform='rotate('+dd+'deg)';document.getElementById('dirNow').style.color=isWarn(dd)?'var(--warn)':'var(--text)'}
    // Forecast
    const fd=W.hourly.wind_direction_10m.slice(wi,wi+6),ft=W.hourly.time.slice(wi,wi+6);
    const c=document.getElementById('forecastArrows');c.innerHTML='';
    fd.forEach((deg,i)=>{
      const w=isWarn(deg),t=new Date(ft[i]);
      const hh=String(t.getHours()).padStart(2,'0')+':'+String(t.getMinutes()).padStart(2,'0');
      const el=document.createElement('div');el.className='forecast-item'+(w?' warn-dir':'');
      el.innerHTML='<div class="forecast-time">'+hh+'</div><div class="forecast-dir-val '+(w?'warn':'ok')+'">'+getDir(deg)+'</div><div class="forecast-deg">'+Math.round(deg)+'°</div>';
      c.appendChild(el);
      if(i<fd.length-1){const s=document.createElement('div');s.className='arrow-sep';s.textContent='›';c.appendChild(s)}
    });
    // Swell
    const sc=M.hourly.swell_wave_height?.[mi];
    const se=document.getElementById('swellVal');se.className='swell-val';se.textContent=sc!=null?Math.round(sc*100)+' cm':'N/D';
    document.getElementById('waveDir').textContent=getDir(M.hourly.wave_direction?.[mi]);
    setStatus('ok','Aggiornato · '+new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'}));
  }catch(e){
    console.error(e);setStatus('error','Errore caricamento dati');
    ['waveVal','windVal','swellVal'].forEach(id=>{const el=document.getElementById(id);el.className='';el.textContent='N/D'});
  }
}
loadData();setInterval(loadData,600000);
</script>
</body>
</html>
